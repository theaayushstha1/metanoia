# Build the container with build-time NEXT_PUBLIC_* values (both public, no secrets),
# push to Artifact Registry. Invoked via:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_IMAGE=...,_PUB_KEY=...,_APP_URL=... \
#     --project=metanoia-agent-17047 --account=comeoverwhenyouaresoberr@gmail.com
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg=NEXT_PUBLIC_HYPERSWITCH_PUBLISHABLE_KEY=${_PUB_KEY}
      - --build-arg=NEXT_PUBLIC_APP_URL=${_APP_URL}
      - -t=${_IMAGE}
      - .
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}"]
images:
  - "${_IMAGE}"
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
