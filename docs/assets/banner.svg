<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" font-family="'Segoe UI',system-ui,-apple-system,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#12235a"/>
      <stop offset="1" stop-color="#2b6bf3"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4d8cff"/>
      <stop offset="1" stop-color="#1e54d0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4d8cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4d8cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="340" rx="0" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="320" fill="url(#glow)"/>
  <!-- dot grid -->
  <g fill="#ffffff" opacity="0.06">
    <!-- sparse decorative dots -->
    <circle cx="120" cy="70" r="2"/><circle cx="180" cy="70" r="2"/><circle cx="240" cy="70" r="2"/>
    <circle cx="120" cy="270" r="2"/><circle cx="180" cy="270" r="2"/><circle cx="240" cy="270" r="2"/>
    <circle cx="1120" cy="270" r="2"/><circle cx="1180" cy="270" r="2"/><circle cx="1060" cy="270" r="2"/>
  </g>

  <!-- mark: an M reflected into its own inversion (the metanoia "turn") -->
  <g transform="translate(96,110) scale(1.2)" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 50 L22 24 L50 44 L78 24 L78 50"/>
    <path d="M22 50 L22 76 L50 56 L78 76 L78 50"/>
  </g>

  <text x="252" y="150" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="1">metanoia</text>
  <text x="256" y="205" font-size="30" font-weight="600" fill="#dbe6ff">Give your agent a budget, not your card.</text>
  <text x="256" y="252" font-size="18" font-weight="500" fill="#9db6f0" letter-spacing="0.5">Autonomous, mandate-bound procurement · Juspay Hyperswitch · Gemini on Vertex AI</text>

  <!-- pills -->
  <g font-size="14" font-weight="600">
    <g transform="translate(256,286)">
      <rect width="180" height="34" rx="17" fill="#ffffff" opacity="0.08"/>
      <text x="18" y="22" fill="#cfe0ff">MODEL PROPOSES</text>
    </g>
    <g transform="translate(452,286)">
      <rect width="176" height="34" rx="17" fill="#ffffff" opacity="0.08"/>
      <text x="18" y="22" fill="#cfe0ff">SERVER DECIDES</text>
    </g>
    <g transform="translate(644,286)">
      <rect width="210" height="34" rx="17" fill="#ffffff" opacity="0.08"/>
      <text x="18" y="22" fill="#cfe0ff">HYPERSWITCH SETTLES</text>
    </g>
  </g>
</svg>
